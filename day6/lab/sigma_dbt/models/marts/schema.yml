version: 2

mart_transaction_metrics:
  description: "Metrics derived from transaction data including revenue, failure rate, and merchant details."
  columns:
    - name: transaction_id
      description: "Unique identifier for each transaction."
      tests:
        - not_null
    - name: amount
      description: "Amount of the transaction in USD."
      tests:
        - not_null
    - name: status
      description: "Status of the transaction (COMPLETED, FAILED, PENDING)."
      tests:
        - accepted_values:
            values: ['COMPLETED', 'FAILED', 'PENDING']
        - not_null
    - name: merchant_id
      description: "Foreign key to dim_merchant table."
      tests:
        - not_null
        - relationships:
            to: ref('dim_merchant')
            field: merchant_id
    - name: customer_id
      description: "Foreign key to dim_customer table."
      tests:
        - not_null
        - relationships:
            to: ref('dim_customer')
            field: customer_id
    - name: transaction_date
      description: "Date of the transaction."
      tests:
        - not_null
    - name: payment_method
      description: "Payment method used for the transaction (CREDIT_CARD, DEBIT_CARD, UPI)."
      tests:
        - not_null
    - name: merchant_name
      description: "Name of the merchant from dim_merchant."
      tests:
        - not_null
    - name: total_revenue
      description: "Total revenue from completed transactions."
      tests:
        - not_null
        - tests.dbt_expectations.expect_column_value_to_be_between:
            min_value: 0
    - name: failure_rate_pct
      description: "Failure rate of transactions as a percentage."
      tests:
        - not_null
        - tests.dbt_expectations.expect_column_value_to_be_between:
            min_value: 0
            max_value: 100
    - name: invalid_status_check
      description: "Check for invalid status values like 'CANCELLED'."
      tests:
        - test.dbt_expectations.expect_column_values_to_not_match_regex:
            regex: 'CANCELLED'
